# Examples Mapping — Maps tutorial-factory generation params to AEO folder names.
# Each entry produces a self-contained, deployable example folder.
#
# Fields:
#   product    — TF product key (sms, voice, iot, sip, ai)
#   use_case   — TF use-case slug
#   language   — TF language key (python, nodejs, go, ruby)
#   framework  — TF framework key (flask, fastapi, express, gin, rails)
#   folder     — AEO output folder name (action-oriented, SEO-friendly)

